<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ประวัติส่วนตัว | อัษฎา ปาคำวัง</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(-45deg,#38bdf8,#60a5fa,#ffffff,#93c5fd);
    background-size:400% 400%;
    animation:bg 12s ease infinite;

}


@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}


.card{

    width:700px;
    max-width:90%;

    padding:40px;

    text-align:center;

    background:rgba(255,255,255,.2);

    backdrop-filter:blur(20px);

    border-radius:30px;

    border:1px solid rgba(255,255,255,.5);

    box-shadow:0 20px 45px rgba(0,0,0,.25);

}


h1{

    color:white;

    font-size:40px;

    margin-bottom:25px;

    text-shadow:0 0 15px #2563eb;

}


img{

    width:200px;
    height:200px;

    object-fit:cover;

    border-radius:50%;

    border:5px solid white;

    box-shadow:0 0 30px white;

}


.info{

    margin-top:25px;

}


p{

    font-size:20px;

    color:#0f172a;

    margin:12px;

}


a{

    display:inline-block;

    margin-top:25px;

    padding:12px 30px;

    color:white;

    text-decoration:none;

    border-radius:30px;

    background:linear-gradient(135deg,#0ea5e9,#2563eb);

    transition:.3s;

}


a:hover{

    transform:translateY(-5px);

    box-shadow:
    0 0 20px #38bdf8,
    0 0 40px #2563eb;

}

</style>

</head>


<body>


<div class="card">


<h1>👤 ประวัติส่วนตัว</h1>


<img src="1000026431.jpg" alt="รูปของผม">


<div class="info">

<p>ชื่อ : นาย อัษฎา ปาคำวัง</p>

<p>ชื่อเล่น : อัษ</p>

<p>วันเกิด : __________</p>

<p>อายุ : 17 ปี</p>

<p>โรงเรียน : โรงเรียนพานทอง</p>

<p>ระดับชั้น : มัธยมศึกษาปีที่ 6</p>

<p>งานอดิเรก : เล่นเกม ฟังเพลง ออกกำลังกาย</p>

</div>


<a href="index.html">🏠 กลับหน้าหลัก</a>


</div>


</body>
</html>
