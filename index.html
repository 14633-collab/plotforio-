<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

background:linear-gradient(-45deg,#38bdf8,#60a5fa,#ffffff,#93c5fd);
background-size:400% 400%;
animation:bg 12s ease infinite;

overflow:hidden;

}

@keyframes bg{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.card{

width:900px;
max-width:90%;

padding:40px;

border-radius:30px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.4);

box-shadow:0 20px 45px rgba(0,0,0,.25);

text-align:center;

animation:fade 1s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

img{

width:230px;
height:230px;

object-fit:cover;

border-radius:50%;

border:6px solid white;

box-shadow:0 0 35px rgba(255,255,255,.9);

transition:.4s;

}

img:hover{

transform:scale(1.08) rotate(3deg);

}

h1{

color:white;
font-size:45px;
margin:20px;

text-shadow:0 0 15px rgba(0,0,0,.3);

}

h2{

color:#0f172a;

}

p{

font-size:20px;
margin:15px;

color:#334155;

}

.menu{

margin-top:35px;

}

.menu a{

display:inline-block;

margin:10px;

padding:14px 28px;

border-radius:40px;

text-decoration:none;

font-weight:bold;

color:white;

background:linear-gradient(135deg,#0ea5e9,#2563eb);

transition:.35s;

box-shadow:0 10px 20px rgba(37,99,235,.3);

}

.menu a:hover{

transform:translateY(-6px) scale(1.08);

box-shadow:0 18px 30px rgba(37,99,235,.4);

}

.menu a:active{

transform:scale(.95);

}
/* ===== เมฆลอย ===== */

.cloud{
    position:fixed;
    width:220px;
    height:70px;
    background:rgba(255,255,255,0.9);
    border-radius:100px;
    z-index:-1;
    animation:cloudMove linear infinite;
}

.cloud::before{
    content:"";
    position:absolute;
    width:80px;
    height:80px;
    background:white;
    border-radius:50%;
    top:-35px;
    left:30px;
}

.cloud::after{
    content:"";
    position:absolute;
    width:100px;
    height:100px;
    background:white;
    border-radius:50%;
    top:-45px;
    right:30px;
}

.cloud1{
    top:80px;
    left:-250px;
    animation-duration:35s;
}

.cloud2{
    top:220px;
    left:-350px;
    transform:scale(.8);
    animation-duration:45s;
}

.cloud3{
    top:420px;
    left:-300px;
    transform:scale(1.2);
    animation-duration:55s;
}

@keyframes cloudMove{
    from{
        transform:translateX(-350px);
    }
    to{
        transform:translateX(calc(100vw + 700px));
    }
}

/* ===== ดาวระยิบระยับ ===== */

.star{
    position:fixed;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px white;
    animation:twinkle 2s infinite ease-in-out;
    z-index:-1;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
        transform:scale(.5);
    }
    50%{
        opacity:1;
        transform:scale(1.8);
    }
}

/* ตำแหน่งดาว */

.star1{top:8%;left:12%;animation-delay:0s;}
.star2{top:18%;left:70%;animation-delay:.5s;}
.star3{top:30%;left:25%;animation-delay:1s;}
.star4{top:12%;left:90%;animation-delay:1.5s;}
.star5{top:42%;left:82%;animation-delay:2s;}
.star6{top:60%;left:15%;animation-delay:.8s;}
.star7{top:72%;left:45%;animation-delay:1.2s;}
.star8{top:80%;left:75%;animation-delay:2.3s;}
.star9{top:25%;left:55%;animation-delay:1.7s;}
.star10{top:88%;left:30%;animation-delay:.3s;}
/* ===== คลื่นทะเล SVG ===== */

.wave-container{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    overflow:hidden;
    line-height:0;
    z-index:1;
}

.wave-container svg{
    display:block;
    width:200%;
    height:180px;
}

.wave1{
    animation:wave1 12s linear infinite;
}

.wave2{
    animation:wave2 18s linear infinite;
}

.wave3{
    animation:wave1 25s linear infinite;
}

@keyframes wave1{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-25%);
    }
}

@keyframes wave2{
    from{
        transform:translateX(-25%);
    }
    to{
        transform:translateX(0);
    }
}

/* ให้การ์ดอยู่หน้าคลื่น */
.card{
    position:relative;
    z-index:10;
}
    
</style>
</head>
