<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ประวัติการศึกษา | อัษฎา ปาคำวัง</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(-45deg,#38bdf8,#60a5fa,#ffffff,#93c5fd);

    background-size:400% 400%;

    animation:bg 12s ease infinite;

}


@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}


.card{

    width:750px;

    max-width:90%;

    padding:40px;

    text-align:center;

    background:rgba(255,255,255,.2);

    backdrop-filter:blur(20px);

    border-radius:30px;

    border:1px solid rgba(255,255,255,.5);

    box-shadow:0 20px 45px rgba(0,0,0,.25);

}


h1{

    color:white;

    font-size:40px;

    margin-bottom:30px;

    text-shadow:0 0 15px #2563eb;

}


.school{

    background:rgba(255,255,255,.35);

    padding:20px;

    margin:20px 0;

    border-radius:20px;

    transition:.3s;

}


.school:hover{

    transform:translateY(-8px);

    box-shadow:
    0 0 20px #38bdf8,
    0 0 40px #2563eb;

}


h2{

    color:#0f172a;

    margin-bottom:10px;

}


p{

    color:#334155;

    font-size:20px;

    margin:8px;

}


a{

    display:inline-block;

    margin-top:25px;

    padding:12px 30px;

    color:white;

    text-decoration:none;

    border-radius:30px;

    background:linear-gradient(135deg,#0ea5e9,#2563eb);

    transition:.3s;

}


a:hover{

    transform:translateY(-5px);

    box-shadow:
    0 0 20px #38bdf8;

}


</style>

</head>


<body>


<div class="card">


<h1>🎓 ประวัติการศึกษา</h1>


<div class="school">

<h2>ระดับประถมศึกษา</h2>

<p>โรงเรียน __________________</p>

<p>ปีการศึกษา __________</p>

</div>



<div class="school">

<h2>ระดับมัธยมศึกษาตอนต้น</h2>

<p>โรงเรียนพานทอง</p>

<p>ระดับชั้น มัธยมศึกษาปีที่ 1 - 3</p>

</div>



<div class="school">

<h2>ระดับมัธยมศึกษาตอนปลาย</h2>

<p>โรงเรียนพานทอง</p>

<p>ระดับชั้น มัธยมศึกษาปีที่ 4 - 6</p>

</div>



<a href="index.html">🏠 กลับหน้าหลัก</a>


</div>


</body>
</html>
